<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin - The Living Codex{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #101413;
      color: #e0e3e1;
      font-family: "Space Grotesk", system-ui, sans-serif;
    }
    .admin-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .admin-panel {
      background: rgba(24, 28, 27, 0.78);
      border: 1px solid rgba(113, 215, 205, 0.22);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
    }
    .btn-codex {
      border: 1px solid rgba(113, 215, 205, 0.55);
      color: #71d7cd;
      background: rgba(0, 49, 46, 0.32);
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }
    .btn-codex:hover {
      border-color: #71d7cd;
      color: #e0e3e1;
      background: rgba(0, 49, 46, 0.72);
    }
    .form-control,
    .form-select {
      background: rgba(16, 20, 19, 0.82);
      border-color: rgba(113, 215, 205, 0.24);
      color: #e0e3e1;
      border-radius: 6px;
    }
    .form-control:focus,
    .form-select:focus {
      background: rgba(16, 20, 19, 0.95);
      border-color: #71d7cd;
      color: #e0e3e1;
      box-shadow: 0 0 0 0.2rem rgba(113, 215, 205, 0.15);
    }
    .table {
      --bs-table-bg: transparent;
      --bs-table-color: #e0e3e1;
      --bs-table-border-color: rgba(113, 215, 205, 0.18);
    }
  </style>
</head>
<body>
  <main class="admin-shell">
    <nav class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <a href="{{ url_for('get_all_posts') }}" class="text-decoration-none text-info">The Living Codex</a>
      <div class="d-flex flex-wrap gap-2">
        <a href="{{ url_for('admin_projects') }}" class="btn btn-sm btn-codex">Projects</a>
        <a href="{{ url_for('admin_messages') }}" class="btn btn-sm btn-codex">Messages</a>
        <a href="{{ url_for('create_fragment_page') }}" class="btn btn-sm btn-outline-light">New Fragment</a>
      </div>
    </nav>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4">
          {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'info' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
